<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />

  <!-- ✅ 수정: as="style" 제거 (일반 stylesheet 링크) -->
  <link rel="stylesheet" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />

  <title>팀 결과</title>
  <style>
    :root{
      --bg:#0b0f14; --panel:#0f1520; --card:#121a26; --card2:#0f1724; --line:#1f2a3a;
      --text:#e7eef8; --muted:#9fb0c3; --accent:#4da3ff; --ok:#43d17a; --danger:#ff5b5b;

      --tier-celestial:#4da3ff; --tier-celestial-bg: rgba(77,163,255,0.08); --tier-celestial-border: rgba(77,163,255,0.45);
      --tier-middle:#43d17a;    --tier-middle-bg: rgba(67,209,122,0.08);  --tier-middle-border: rgba(67,209,122,0.45);
      --tier-underground:#ff4fa3; --tier-underground-bg: rgba(255,79,163,0.08); --tier-underground-border: rgba(255,79,163,0.45);

      --pos-top:#8b5cf6; --pos-jug:#ef4444; --pos-mid:#3b82f6; --pos-adc:#f59e0b; --pos-sup:#10b981;
      --radius-sm: 6px; --radius-lg: 14px;
      --mmr-final: rgba(231,238,248,0.92);
    }

    *{box-sizing:border-box}
    body{
      margin:0; font-family:"Pretendard Variable", Pretendard, system-ui, -apple-system, sans-serif;
      background:var(--bg); color:var(--text);
      padding:16px;
    }
    .wrap{
      max-width: 1280px;              
      margin: 0 auto;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 380px;  
      gap: 12px;
      align-items: start;
    }
    .panel{ background:var(--panel); border:1px solid var(--line); border-radius:var(--radius-lg); padding:14px; }
    .topbar{display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap:wrap;}
    .title{font-size:18px; font-weight:900; letter-spacing:-0.2px}
    .meta{font-size:12px; color:var(--muted); font-weight:600}
    .btn{
      border:1px solid var(--line);
      background:rgba(255,255,255,0.03);
      color:var(--text);
      padding:10px 12px;
      border-radius:12px;
      cursor:pointer;
      font-weight:800;
      white-space:nowrap;
    }
    .btn:hover{border-color:#2a3a52}
    .badge{
      display:inline-flex; align-items:center; gap:8px;
      padding:8px 10px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,0.12);
      background:rgba(255,255,255,0.03);
      font-size:12px;
      font-weight:800;
      color:rgba(231,238,248,0.92);
    }

    .teamTable{
      width:100%;
      border-collapse: separate;
      border-spacing: 0;
      font-size:12px;
      table-layout: fixed;
    }
    .teamTable col.col-team{ width:140px; }
    .teamTable col.col-slot{ width:120px; }
    .teamTable th, .teamTable td{
      border:1px solid var(--line);
      padding:6px;
      text-align:center;
      background: rgba(0,0,0,0.12);
      overflow:hidden;
    }
    .teamTable th{ font-weight:700; background:rgba(255,255,255,0.04); color:var(--muted); }
    .teamTable td{ font-weight:800; }

    .teamTable thead th{ padding-top:10px; padding-bottom:12px; }
    .teamTable thead th[data-role="TOP"]{ color: var(--pos-top); box-shadow: inset 0 -3px 0 rgba(139,92,246,0.9); }
    .teamTable thead th[data-role="JUG"]{ color: var(--pos-jug); box-shadow: inset 0 -3px 0 rgba(239,68,68,0.9); }
    .teamTable thead th[data-role="MID"]{ color: var(--pos-mid); box-shadow: inset 0 -3px 0 rgba(59,130,246,0.9); }
    .teamTable thead th[data-role="ADC"]{ color: var(--pos-adc); box-shadow: inset 0 -3px 0 rgba(245,158,11,0.9); }
    .teamTable thead th[data-role="SUP"]{ color: var(--pos-sup); box-shadow: inset 0 -3px 0 rgba(16,185,129,0.9); }

    .teamTable td.violate{
      background: rgba(255,91,91,0.12);
      border-color: rgba(255,91,91,0.6);
    }
    .teamTable td.violate .teamNick{ color:#ffb4b4; }

    .grid{display:grid; grid-template-columns:repeat(2, minmax(0, 1fr)); gap:12px;}
    @media (max-width: 900px){ .grid{grid-template-columns:1fr;} }

    .teamCard{
      background:linear-gradient(135deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
      border:1px solid var(--line);

      /* ✅ 수정: --radius 없음 → --radius-lg로 변경 */
      border-radius:var(--radius-lg);

      padding:12px;
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .teamHead{
      display:grid;
      grid-template-columns: 40% 60%;
      align-items:center;
      gap:10px;
    }
    .teamName{font-size:16px; font-weight:950}
    .teamSmall{font-size:12px; color:var(--muted); font-weight:700}
    table{width:100%; border-collapse:separate; border-spacing:0}
    th, td{
      border:1px solid var(--line);
      padding:8px;
      text-align:center;
      font-size:13px;
      background:rgba(0,0,0,0.14);
    }
    th{color:var(--muted); font-weight:900; background:rgba(255,255,255,0.04)}
    td{font-weight:900}
    .captain{color:var(--accent)}

    .empty{
      padding:14px;
      border:1px dashed var(--line);

      /* ✅ 수정: --radius 없음 → --radius-lg로 변경 */
      border-radius:var(--radius-lg);

      color:var(--muted);
      font-size:13px;
      text-align:center;
    }
    .err{color:#ffb4b4}
    code{font-family:ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace}

    .teamNameBig{
      font-size:18px;
      font-weight:950;
      letter-spacing:-0.4px;
      text-align:left;
      padding-left:2px;
      white-space:nowrap;
    }
    .teamStats{ display:flex; flex-direction:column; gap:4px; align-items:flex-start; }
    .teamAvgLine, .teamSdLine{
      display:flex;
      align-items:baseline;
      gap:6px;
      justify-content:flex-start;
      font-weight:600;
    }
    .teamAvgLabel, .teamSdLabel{
      font-size:11px;
      color:var(--muted);
      font-weight:800;
      text-transform: lowercase;
    }
    .teamAvgValue{
      font-size:16px;
      font-weight:900;
      color:var(--text);
      font-variant-numeric: tabular-nums;
    }
    .teamAvgValue.avgGrad{
      position:relative;
      display:inline-block;
      padding:1px 8px;
      border-radius:999px;
      color:var(--text);
      font-weight:950;
      letter-spacing:-0.2px;
      background: rgba(var(--avg-rgb), var(--avg-alpha));
      border: 1px solid rgba(var(--avg-rgb), var(--avg-border-a));
      box-shadow: 0 0 0 1px rgba(0,0,0,0.25) inset, 0 6px 18px rgba(0,0,0,0.25);
    }
    .teamAvgValue.avgGrad::after{
      content:"";
      position:absolute;
      inset:-6px -10px;
      border-radius:999px;
      background: radial-gradient(closest-side, rgba(var(--avg-rgb), calc(var(--avg-alpha) * 0.55)), transparent 70%);
      filter: blur(6px);
      opacity: 0.9;
      z-index:-1;
    }
    .teamSdValue{
      font-size:13px;
      font-weight:700;
      color:var(--text);
      opacity:0.9;
      font-variant-numeric: tabular-nums;
    }

    .teamCell{
      display:flex;
      flex-direction:column;
      gap:1px;
      align-items:center;
      position:relative;
    }
    .teamNick.tier-cel{ color: var(--tier-celestial); }
    .teamNick.tier-mid{ color: var(--tier-middle); }
    .teamNick.tier-und{ color: var(--tier-underground); }


    .teamNick{
      cursor:pointer;
      display:block;            /* ✅ inline-flex 제거 */
      text-align:center;        /* ✅ 가운데 */
      padding: 2px 4px;         /* 필요하면 조절 */
      border-radius: 8px;
      user-select:none;
      transition: background .15s ease, transform .06s ease, text-decoration-color .15s ease;
      white-space:nowrap;
      overflow:hidden;
      text-overflow: ellipsis;
      line-height:1.0;
    }

/* hover시 살짝 하이라이트 + 밑줄 느낌 */
.teamNick:hover{
  background: rgba(255,255,255,0.05);
  text-decoration: underline;
  text-decoration-color: rgba(231,238,248,0.35);
  text-underline-offset: 3px;
}

/* 클릭 순간 눌리는 느낌 */
.teamNick:active{
  transform: translateY(1px);
}

/* ↗ 아이콘: 기본 숨김, hover때만 표시 */
.teamNick .nickHint{
  opacity: 0;
  transform: translateX(-2px);
  transition: opacity .15s ease, transform .15s ease;
  font-size: 12px;
  color: rgba(231,238,248,0.55);
}

.teamNick:hover .nickHint{
  opacity: 1;
  transform: translateX(0);
}

/* ✅ 현재 선택(우측 패널에 표시 중인) 닉네임 강조 */
.teamNick.active{
  background: rgba(77,163,255,0.12);
  border: 1px solid rgba(77,163,255,0.55);
  box-shadow: 0 0 0 1px rgba(0,0,0,0.25) inset, 0 10px 24px rgba(0,0,0,0.35);
}

.teamNick.active .nickText{
  text-decoration: underline;
  text-decoration-color: rgba(77,163,255,0.55);
  text-underline-offset: 3px;
}

    .teamNums{ display:flex; flex-direction:column; gap:1px; margin-top:2px; }
    .teamBase{
      font-size:11px;
      font-weight:500;
      color:var(--muted);
      opacity:0.75;
      font-variant-numeric: tabular-nums;
      line-height:1.0;
    }
    .teamCorr{
      font-size:14px;
      font-weight:800;
      color: var(--mmr-final);
      font-variant-numeric: tabular-nums;
      letter-spacing:-0.2px;
      line-height:1.0;
    }
    .teamCell.offrole{
      border:1px dashed var(--accent);
      border-radius: var(--radius-sm);
      padding:4px;
    }

    .teamCell .nickHint{
      position:absolute;
      top: 6px;
      right: 6px;
      font-size: 12px;
      color: rgba(231,238,248,0.55);
      opacity: 0;
      transform: translateX(-2px);
      transition: opacity .15s ease, transform .15s ease;
      pointer-events: none; /* ✅ 아이콘이 클릭 방해 안 하게 */
    }

    .teamCell:hover .nickHint{
      opacity: 1;
      transform: translateX(0);
    }

    .playerHead{
      display:flex;
      flex-direction: column;
      gap: 6px;
      padding-right: 88px; /* close btn space */
      margin-bottom: 12px;
    }
    .playerNick{
      font-size: 18px;
      font-weight: 950;
      letter-spacing: -0.2px;
    }
    .playerSub{
      display:flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .pill2{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.03);
      color: rgba(231,238,248,0.92);
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
      font-weight: 900;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    .playerGrid{
      display:grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }
    @media (max-width: 520px){
      .playerGrid{ grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }

    .playerStat{
      border: 1px solid rgba(255,255,255,0.10);
      background: rgba(0,0,0,0.18);
      border-radius: 16px;
      padding: 10px 10px;
      display:flex;
      flex-direction: column;
      gap: 4px;
      min-width: 0;
    }
    .playerStat .k{
      font-size: 11px;
      color: var(--muted);
      font-weight: 900;
      letter-spacing: -0.1px;
    }
    .playerStat .v{
      font-size: 16px;
      font-weight: 950;
      letter-spacing: -0.2px;
    }

    .playerSection{
      margin-top: 12px;
      border: 1px solid rgba(255,255,255,0.10);
      background: rgba(0,0,0,0.16);
      border-radius: 18px;
      padding: 12px 12px;
    }
    .playerSectionTitle{
      display:flex;
      align-items:center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 10px;
    }
    .playerSectionTitle .t{
      font-size: 13px;
      font-weight: 950;
    }
    .playerSectionTitle .hint{
      font-size: 12px;
      color: var(--muted);
      font-weight: 700;
    }

    .champList{
      display:flex;
      flex-direction: column;
      gap: 8px;
    }

    .champRow{
      position: relative;
      border: 1px solid rgba(255,255,255,0.10);
      background: rgba(255,255,255,0.02);
      border-radius: 14px;
      padding: 11px 12px;
      overflow: hidden;
      isolation: isolate;
    }

    .champBar{
      position:absolute;
      left:0;
      top:0;
      bottom:0;
      width: var(--bar-pct, 0%);
      background: linear-gradient(90deg, rgba(77,163,255,0.22), rgba(77,163,255,0.08));
      border-right: 1px solid rgba(77,163,255,0.28);
      z-index: 0;
    }

    .champRowInner{
      position: relative;
      z-index: 1;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 10px;
    }

    .champName{
      font-size: 13px;
      font-weight: 950;
      overflow:hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      min-width: 0;
      flex: 1 1 auto;
    }

    .champMeta{
      display:flex;
      align-items:baseline;
      gap: 8px;
      justify-content:flex-end;
      flex: 0 0 auto;
    }

    .champWin{
      font-size: 12px;
      font-weight: 950;
      font-variant-numeric: tabular-nums;
    }

    .champGames{
      font-size: 11px;
      color: var(--muted);
      font-weight: 900;
      font-variant-numeric: tabular-nums;
    }

    .miniStatGrid{
      display:grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .miniStat{
      border: 1px solid rgba(255,255,255,0.10);
      background: rgba(255,255,255,0.02);
      border-radius: 14px;
      padding: 10px 8px;
      min-width: 0;
      text-align:center;
    }

    .miniStat .k{
      font-size: 11px;
      color: var(--muted);
      font-weight: 900;
      letter-spacing: -0.1px;
      margin-bottom: 4px;
    }

    .miniStat .v{
      font-size: 15px;
      font-weight: 950;
      letter-spacing: -0.2px;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .sidePanel{
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      padding: 14px;
      position: sticky;
      top: 16px;             /* body padding과 맞춤 */
      height: calc(100vh - 32px);
      overflow: auto;
    }

.sideTitle{
  font-size: 14px;
  font-weight: 950;
  color: rgba(231,238,248,0.92);
  margin-bottom: 10px;
}

.sideEmpty{
  border: 1px dashed var(--line);
  border-radius: var(--radius-lg);
  padding: 12px;
  color: var(--muted);
  font-weight: 800;
  font-size: 13px;
  text-align: left;
}

.sideCloseRow{
  display:flex;
  justify-content:flex-end;
  margin-bottom: 8px;
}

.sideCloseBtn{
  padding: 8px 10px;
  border-radius: 12px;
  font-size: 12px;
}
.sidePanel .nickHint{
  display: none !important;
}

/* ✅ 우측 패널 닉네임 티어 색 */
.playerNick.tier-cel{ color: var(--tier-celestial); }
.playerNick.tier-mid{ color: var(--tier-middle); }
.playerNick.tier-und{ color: var(--tier-underground); }
  </style>
</head>

<body>
  <div class="wrap">
    <!-- LEFT COLUMN -->
    <div class="leftCol">
      <div class="panel">
        <div class="topbar">
          <div>
            <div class="title">팀 결과</div>
            <div class="meta" id="metaLine">불러오는 중…</div>
          </div>
          <div style="display:flex; gap:8px; align-items:center; flex-wrap:wrap;">
            <span class="badge" id="idBadge">ID: -</span>
            <button class="btn" id="copyBtn" style="display:none;">링크 복사</button>
          </div>
        </div>
      </div>

      <div class="panel" id="content">
        <div class="empty">불러오는 중…</div>
      </div>
    </div>

    <!-- RIGHT COLUMN -->
    <aside class="sidePanel" id="sidePanel">
      <div class="sideTitle">플레이어 정보</div>

      <div class="sideEmpty" id="sideEmpty">
        
      </div>

      <!-- 기존 팝업 내용 재사용 -->
      <div id="sideBody" style="display:none;">
        <div class="sideCloseRow">
          <button class="btn sideCloseBtn" id="sideCloseBtn" title="닫기">닫기</button>
        </div>

        <div class="playerHead" style="padding-right:0;">
          <div class="playerNick" id="playerPopNick">-</div>
          <div class="playerSub">
            <span class="pill2" id="playerPopMainLine">주력 -</span>
            <span class="pill2" id="playerPopTier">티어 -</span>
          </div>
        </div>

        <div class="playerGrid">
          <div class="playerStat">
            <div class="k">전체 승률</div>
            <div class="v" id="playerPopWrAll">-</div>
          </div>
          <div class="playerStat">
            <div class="k">최근 10 승률</div>
            <div class="v" id="playerPopWr10">-</div>
          </div>
          <div class="playerStat">
            <div class="k">표본</div>
            <div class="v" id="playerPopGames">-</div>
          </div>
        </div>

        <div class="playerSection">
          <div class="playerSectionTitle">
            <div class="t">주요 챔피언 TOP3</div>
            <div class="hint">승률/게임수</div>
          </div>
          <div class="champList" id="playerPopChamps"></div>
        </div>

        <div class="playerSection">
          <div class="playerSectionTitle">
            <div class="t">개인 지표</div>
            <div class="hint">게임당 평균</div>
          </div>
          <div class="miniStatGrid">
            <div class="miniStat">
              <div class="k">KDA</div>
              <div class="v" id="playerPopAvgKda">-</div>
            </div>
            <div class="miniStat">
              <div class="k">시야 점수</div>
              <div class="v" id="playerPopAvgVision">-</div>
            </div>
            <div class="miniStat">
              <div class="k">분당 데미지</div>
              <div class="v" id="playerPopDpm">-</div>
            </div>
          </div>
        </div>
      </div>
    </aside>
  </div>

  <script>
'use strict';

const injectedResultId = String('<?= resultId ?>' || '')
  .trim()
  .replace(/^"+|"+$/g, "");

const qsResultId = String(new URLSearchParams(location.search).get("id") || '')
  .trim()
  .replace(/^"+|"+$/g, "");

const resultId = injectedResultId || qsResultId;

const $ = (id) => document.getElementById(id);

function esc(s){
  return String(s ?? '')
    .replaceAll('&','&amp;').replaceAll('<','&lt;')
    .replaceAll('>','&gt;').replaceAll('"','&quot;')
    .replaceAll("'",'&#39;');
}

function renderError(msg){
  $('metaLine').innerHTML = `<span class="err">에러: ${esc(msg)}</span>`;
  $('content').innerHTML = `<div class="empty"><div class="err" style="font-weight:900; margin-bottom:6px;">불러오기 실패</div>${esc(msg)}</div>`;
}

const CONFIG = {
  ROLES: ['TOP','JUG','MID','ADC','SUP'],
  TIER: { CELESTIAL_MIN: 630, UNDERGROUND_MAX: 280 },
  TIER_NAMES: { CELESTIAL: '천상계', MIDDLE: '중간계', UNDERGROUND: '지하계' },
  MMR_PENALTY: { CELESTIAL: 30, MIDDLE: 50, SUPPORT: 100 }
};

const Utils = {
  normalizePos(pos){
    const v = String(pos || '').toUpperCase();
    return ['TOP','JUG','MID','ADC','SUP','ALL'].includes(v) ? v : 'ALL';
  },
  tierClass(tierName){
    if (tierName === CONFIG.TIER_NAMES.CELESTIAL) return 'cel';
    if (tierName === CONFIG.TIER_NAMES.UNDERGROUND) return 'und';
    return 'mid';
  },
  lerp(a,b,t){ return a + (b-a)*t; }
};

const MMRCalculator = {
  tierByMMR(mmr){
    const val = Number(mmr);
    if (!Number.isFinite(val)) return CONFIG.TIER_NAMES.MIDDLE;
    if (val >= CONFIG.TIER.CELESTIAL_MIN) return CONFIG.TIER_NAMES.CELESTIAL;
    if (val <= CONFIG.TIER.UNDERGROUND_MAX) return CONFIG.TIER_NAMES.UNDERGROUND;
    return CONFIG.TIER_NAMES.MIDDLE;
  },

  excelCorrected(baseMMR, assignedRole){
    const W = Number(baseMMR);
    if (!Number.isFinite(W)) return 0;
    const role = Utils.normalizePos(assignedRole);
    if (role === 'SUP') return W * 0.9;

    const tierMul = W <= CONFIG.TIER.UNDERGROUND_MAX + 10 ? 0.9 : W >= CONFIG.TIER.CELESTIAL_MIN ? 1.2 : 1.05;
    const sigmoid = 0.975 + ((1 / (1 + Math.exp((W - 300) / 50))) + (1 / (1 + Math.exp(-(W - 600) / 50)))) / 2 * 0.05;
    return W * tierMul * sigmoid;
  },

  effective(p, assignedRole){
    if (!p) return 0;
    const role = Utils.normalizePos(assignedRole);
    const primary = Utils.normalizePos(p.primary);
    const baseRaw = Number(p.mmr);
    if (!Number.isFinite(baseRaw)) return 0;
    const tier = this.tierByMMR(baseRaw);

    if (primary === 'ALL' || role === primary || tier === CONFIG.TIER_NAMES.UNDERGROUND){
      return this.excelCorrected(baseRaw, role);
    }

    let mmrForCorrection = baseRaw;
    if (role === 'SUP') mmrForCorrection = baseRaw - CONFIG.MMR_PENALTY.SUPPORT;
    else mmrForCorrection = baseRaw - (tier === CONFIG.TIER_NAMES.CELESTIAL ? CONFIG.MMR_PENALTY.CELESTIAL : CONFIG.MMR_PENALTY.MIDDLE);

    return this.excelCorrected(mmrForCorrection, role);
  },

  baseForDisplay(p, assignedRole){
    if (!p) return { raw: NaN, penal: NaN, off: false };
    const role = Utils.normalizePos(assignedRole);
    const primary = Utils.normalizePos(p.primary);
    const baseRaw = Number(p.mmr);
    if (!Number.isFinite(baseRaw)) return { raw: NaN, penal: NaN, off: false };

    const tier = this.tierByMMR(baseRaw);
    let penal = baseRaw;

    if (primary === 'ALL' || role === primary || tier === CONFIG.TIER_NAMES.UNDERGROUND){
      return { raw: baseRaw, penal, off: primary !== 'ALL' && role !== primary && tier !== CONFIG.TIER_NAMES.UNDERGROUND };
    }

    if (role === 'SUP') penal = baseRaw - CONFIG.MMR_PENALTY.SUPPORT;
    else penal = baseRaw - (tier === CONFIG.TIER_NAMES.CELESTIAL ? CONFIG.MMR_PENALTY.CELESTIAL : CONFIG.MMR_PENALTY.MIDDLE);

    return { raw: baseRaw, penal, off: true };
  }
};

// 규칙(인덱스와 동일)
function validateTeam(team, getPlayer){
  const bad = new Set();

  const mid = getPlayer(team.slots.MID);
  const adc = getPlayer(team.slots.ADC);
  const jug = getPlayer(team.slots.JUG);

  const tMid = mid ? MMRCalculator.tierByMMR(mid.mmr) : null;
  const tAdc = adc ? MMRCalculator.tierByMMR(adc.mmr) : null;
  const tJug = jug ? MMRCalculator.tierByMMR(jug.mmr) : null;

  if (mid && adc && tMid === CONFIG.TIER_NAMES.UNDERGROUND && tAdc === CONFIG.TIER_NAMES.UNDERGROUND){
    bad.add('MID'); bad.add('ADC');
  }
  if (mid && jug && tMid === CONFIG.TIER_NAMES.UNDERGROUND && tJug === CONFIG.TIER_NAMES.UNDERGROUND){
    bad.add('MID'); bad.add('JUG');
  }
  return Array.from(bad);
}

function calcStats(team, getPlayer){
  const vals = [];
  for (const role of CONFIG.ROLES){
    const nick = team.slots[role];
    if (!nick) continue;
    const p = getPlayer(nick);
    if (!p) continue;
    vals.push(MMRCalculator.effective(p, role));
  }
  const n = vals.length;
  if (!n) return { avg: NaN, sd: NaN };
  const avg = vals.reduce((a,b)=>a+b,0)/n;
  if (n === 1) return { avg, sd: 0 };
  const varSample = vals.reduce((acc,x)=>acc + (x-avg)*(x-avg),0)/(n-1);
  return { avg, sd: Math.sqrt(varSample) };
}

function applyTeamAvgGradient(){
  const els = Array.from(document.querySelectorAll('.teamAvgValue[data-avg]'));
  if (!els.length) return;
  const avgs = els.map(el => Number(el.dataset.avg)).filter(v => Number.isFinite(v));
  if (!avgs.length) return;

  const min = Math.min(...avgs);
  const max = Math.max(...avgs);
  const denom = (max - min) || 1;

  const A_MIN = 0.12, A_MAX = 0.55;
  const B_MIN = 0.20, B_MAX = 0.70;

  // ok색(대충 고정)
  const baseRgb = { r: 67, g: 209, b: 122 };

  els.forEach(el => {
    const v = Number(el.dataset.avg);
    if (!Number.isFinite(v)) return;
    const t = Math.min(1, Math.max(0, (v - min) / denom));
    const a = Utils.lerp(A_MIN, A_MAX, t);
    const b = Utils.lerp(B_MIN, B_MAX, t);
    el.style.setProperty('--avg-rgb', `${baseRgb.r},${baseRgb.g},${baseRgb.b}`);
    el.style.setProperty('--avg-alpha', a.toFixed(3));
    el.style.setProperty('--avg-border-a', b.toFixed(3));
    el.classList.add('avgGrad');
  });
}

/** ✅ 정리: renderCell2 + renderTeamTable2만 사용 */
function renderCell(teamIdx, team, role, getPlayer){
  const nick = team.slots?.[role] || null;
  if (!nick){
    return `<td data-team="${teamIdx}" data-role="${role}" style="color:transparent">-</td>`;
  }

  const p = getPlayer(nick);
  const baseInfo = p ? MMRCalculator.baseForDisplay(p, role) : { raw: NaN, penal: NaN, off: false };
  const eff = p ? MMRCalculator.effective(p, role) : NaN;

  const tierName = p ? MMRCalculator.tierByMMR(p.mmr) : CONFIG.TIER_NAMES.MIDDLE;
  const tcls = Utils.tierClass(tierName);
  const nickTierClass = (tcls === 'cel') ? 'tier-cel' : (tcls === 'und') ? 'tier-und' : 'tier-mid';

  const isCaptain = team.captain && team.captain === nick;
  const off = !!baseInfo.off;

  const baseText = Number.isFinite(baseInfo.raw)
    ? (off && baseInfo.penal !== baseInfo.raw ? `${baseInfo.raw.toFixed(0)}→${baseInfo.penal.toFixed(0)}` : `${baseInfo.raw.toFixed(0)}`)
    : '-';

  const effText = Number.isFinite(eff) ? eff.toFixed(1) : '-';

  return `
    <td data-team="${teamIdx}" data-role="${role}">
      <div class="teamCell ${off ? 'offrole' : ''}">
          <div class="teamNick ${nickTierClass}" data-nick="${esc(nick)}" title="클릭해서 보기">
            <span class="nickText">${isCaptain ? '👑 ' : ''}${esc(nick)}</span>
            <span class="nickHint" aria-hidden="true">↗</span>
          </div>
        <div class="teamNums">
          <div class="teamBase">${esc(baseText)}</div>
          <div class="teamCorr"><b>${esc(effText)}</b></div>
        </div>
      </div>
    </td>
  `;
}

function renderTeamTable(teams, getPlayer){
  const roles = CONFIG.ROLES;

  $('content').innerHTML = `
    <table class="teamTable">
      <colgroup>
        <col class="col-team">
        ${roles.map(() => `<col class="col-slot">`).join('')}
      </colgroup>
      <thead>
        <tr>
          <th>팀</th>
          ${roles.map(r => `<th data-role="${r}">${r}</th>`).join('')}
        </tr>
      </thead>
      <tbody>
        ${teams.map((t, teamIdx) => {
          const st = calcStats(t, getPlayer);
          return `
            <tr data-team="${teamIdx}">
              <td>
                <div class="teamHead">
                  <div class="teamNameBig">팀 ${esc(t.id)}</div>
                  <div class="teamStats">
                    <div class="teamAvgLine">
                      <span class="teamAvgLabel">avg</span>
                      <span class="teamAvgValue" data-avg="${Number.isFinite(st.avg) ? st.avg : ''}">
                        ${Number.isFinite(st.avg) ? st.avg.toFixed(1) : '-'}
                      </span>
                    </div>
                    <div class="teamSdLine">
                      <span class="teamSdLabel">sd</span>
                      <span class="teamSdValue">${Number.isFinite(st.sd) ? st.sd.toFixed(1) : '-'}</span>
                    </div>
                  </div>
                </div>
              </td>
              ${roles.map(role => renderCell(teamIdx, t, role, getPlayer)).join('')}
            </tr>
          `;
        }).join('')}
      </tbody>
    </table>
  `;

  // 위반 표시
  const cellMap = new Map();
  document.querySelectorAll('.teamTable td[data-team][data-role]').forEach(td => {
    cellMap.set(`${td.dataset.team}|${td.dataset.role}`, td);
  });

  teams.forEach((t, teamIdx) => {
    const badRoles = validateTeam(t, getPlayer);
    badRoles.forEach(role => {
      const td = cellMap.get(`${teamIdx}|${role}`);
      if (td) td.classList.add('violate');
    });
  });

  applyTeamAvgGradient();
}

(function main(){
  $('idBadge').textContent = `ID: ${resultId || '-'}`;

  // 링크 복사
  const copyBtn = $('copyBtn');
  copyBtn.style.display = 'inline-flex';
  copyBtn.addEventListener('click', async () => {
    try{
      await navigator.clipboard.writeText(
    `${location.origin}${location.pathname}?page=result&id=${encodeURIComponent(resultId)}`
  );
      copyBtn.textContent = '복사됨';
      setTimeout(() => copyBtn.textContent = '링크 복사', 1200);
    }catch(e){
      alert('복사 실패');
    }
  });

  if (!resultId){
    renderError('resultId가 없습니다. (URL에 ?page=result&id=... 필요)');
    return;
  }

  // 1) 결과 먼저 로드
  google.script.run
    .withSuccessHandler((res) => {
      if (!res || !res.ok) return renderError(res?.error || 'unknown error');

      const payload = res.payload || {};
      const createdAt = res.createdAt || '';

      $('metaLine').textContent = createdAt ? `생성: ${createdAt}` : '생성일 정보 없음';

      const rawTeams = Array.isArray(payload.teams) ? payload.teams : [];
      const teams = rawTeams.map(t => ({
        id: t?.id ?? '?',
        captain: t?.captain || null,
        slots: t?.slots || {}
      }));

      // 2) players 로드
      google.script.run
        .withSuccessHandler((pRes) => {
          if (!pRes || !pRes.ok) return renderError(pRes?.error || 'players load failed');

          const players = Array.isArray(pRes.players) ? pRes.players : [];
          const byNick = new Map(players.map(p => [p.nick, p]));
          const getPlayer = (nick) => byNick.get(nick) || null;

          // tier 필드가 비어있을 수 있으니 보정(선택)
          players.forEach(p => {
            if (!p.tier) p.tier = MMRCalculator.tierByMMR(p.mmr);
          });

          renderTeamTable(teams, getPlayer);
          PlayerPopup.wire(getPlayer);
        })
        .withFailureHandler((err) => renderError(err?.message || String(err)))
        .getPlayers();
    })
    .withFailureHandler((err) => renderError(err?.message || String(err)))
    .getTeamResult(resultId);
})();

function roleLabel(role){
  const m = { TOP:'탑', JUG:'정글', MID:'미드', ADC:'원딜', SUP:'서폿', ALL:'올라운더' };
  return m[String(role||'').toUpperCase()] || '올라운더';
}

function pct(n){
  const v = Number(n);
  if (!Number.isFinite(v)) return '-';
  return `${(v*100).toFixed(1)}%`;
}

function num1(n){
  const v = Number(n);
  if (!Number.isFinite(v)) return '-';
  return v.toFixed(1);
}

function num0(n){
  const v = Number(n);
  if (!Number.isFinite(v)) return '-';
  return v.toFixed(0);
}

const PlayerPopup = {
  open(profile){
  const empty = document.getElementById('sideEmpty');
  const body = document.getElementById('sideBody');
  if (empty) empty.style.display = 'none';
  if (body) body.style.display = 'block';

  const nickEl = document.getElementById('playerPopNick');
  const mainEl = document.getElementById('playerPopMainLine');
  const tierEl = document.getElementById('playerPopTier');
  const wrAllEl = document.getElementById('playerPopWrAll');
  const wr10El = document.getElementById('playerPopWr10');
  const gamesEl = document.getElementById('playerPopGames');
  const champsEl = document.getElementById('playerPopChamps');
  const avgKdaEl = document.getElementById('playerPopAvgKda');
  const avgVisionEl = document.getElementById('playerPopAvgVision');
  const dpmEl = document.getElementById('playerPopDpm');

nickEl.textContent = profile?.nick || '-';


  nickEl.classList.remove('tier-cel','tier-mid','tier-und');
  if (profile?.tierCls) nickEl.classList.add(`tier-${profile.tierCls}`);
  mainEl.textContent = `주포 ${profile?.mainLine || '-'}`;
  tierEl.textContent = `MMR ${Number.isFinite(profile?.mmr) ? profile.mmr.toFixed(0) : '-'}`;

  wrAllEl.textContent = pct(profile?.wrAll);
  wr10El.textContent = pct(profile?.wr10);
  gamesEl.textContent = Number.isFinite(Number(profile?.games)) ? `${profile.games}` : '-';

  const champs = Array.isArray(profile?.champs) ? profile.champs.slice(0,3) : [];
  champsEl.innerHTML = champs.length
    ? champs.map(c => {
        const wr = Number(c?.wr);
        const barPct = Number.isFinite(wr)
          ? Math.max(0, Math.min(100, wr * 100))
          : 0;

        return `
          <div class="champRow" style="--bar-pct:${barPct.toFixed(1)}%;">
            <div class="champBar" aria-hidden="true"></div>
            <div class="champRowInner">
              <div class="champName">${esc(c?.name || '-')}</div>
              <div class="champMeta">
                <span class="champWin">${pct(c?.wr)}</span>
                <span class="champGames">${Number(c?.games)||0}G</span>
              </div>
            </div>
          </div>
        `;
      }).join('')
    : `<div class="empty">표시할 챔프 데이터가 없음</div>`;

    
    if (avgKdaEl) avgKdaEl.textContent = num1(profile?.avgKda);
    if (avgVisionEl) avgVisionEl.textContent = num1(profile?.avgVision);
    if (dpmEl) dpmEl.textContent = num0(profile?.dpm);
  },

  close(){
    const empty = document.getElementById('sideEmpty');
    const body = document.getElementById('sideBody');
    if (body) body.style.display = 'none';
    if (empty) empty.style.display = 'block';

    setActiveNick('');
  },

  wire(getPlayer){
    const sideClose = document.getElementById('sideCloseBtn');
    if (sideClose) sideClose.addEventListener('click', () => this.close());

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') this.close();
    });

    const content = document.getElementById('content');
    if (!content) return;

    content.addEventListener('click', (e) => {
      const nickEl = e.target.closest('.teamNick');
      if (!nickEl) return;

      const nick = String(nickEl.dataset.nick || '').trim();
      if (!nick) return;

      setActiveNick(nick);
      renderProfileLoading(nick);

      google.script.run
        .withSuccessHandler((res) => {
          if (!res || !res.ok) {
            return renderProfileError(nick, res?.error || '플레이어 정보 불러오기 실패');
          }

          const profile = res.profile || null;
          if (!profile) {
            return renderProfileError(nick, '프로필 데이터가 없습니다.');
          }

          this.open(profile);
        })
        .withFailureHandler((err) => {
          renderProfileError(nick, err?.message || String(err));
        })
        .getPlayerProfileByNick(nick);
    });
  }
};
function setActiveNick(nick){
  // 기존 active 제거
  document.querySelectorAll('.teamNick.active').forEach(el => el.classList.remove('active'));

  if (!nick) return;

  document.querySelectorAll(`.teamNick[data-nick="${CSS.escape(nick)}"]`)
    .forEach(el => el.classList.add('active'));
}
